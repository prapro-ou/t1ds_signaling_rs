services:
  signaling:
    build: .
    expose:
      - "3000"
    environment:
      # LISTEN_ADDR: "0.0.0.0:3000" # 待ち受けアドレス変更時はexposeも合わせて変更する
      MAX_ROOMS: "10"
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

volumes:
  caddy_data: